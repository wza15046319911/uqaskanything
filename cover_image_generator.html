<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UQ 课程笔记封面生成器</title>
    <style>
        :root {
            --uq-deep: #26215C;
            --uq-mid: #3C3489;
            --uq-main: #534AB7;
            --uq-light: #7F77DD;
            --uq-pale: #AFA9EC;
            --uq-card: #EEEDFE;
            --uq-line: #CECBF6;
            --ink: #2C2C2A;
            --muted: #6b6b78;
            --panel: #faf9fc;
            --border: #e6e3f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f3f2f7;
            color: var(--ink);
            line-height: 1.6;
            min-height: 100vh;
        }

        .wrap {
            display: flex;
            gap: 32px;
            padding: 32px;
            max-width: 1400px;
            margin: 0 auto;
            align-items: flex-start
        }

        @media(max-width:1100px) {
            .wrap {
                flex-direction: column;
                align-items: center
            }
        }

        /* ---- form panel ---- */
        .panel {
            flex: 0 0 380px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            position: sticky;
            top: 32px;
        }

        @media(max-width:1100px) {
            .panel {
                position: static;
                width: 100%;
                max-width: 540px
            }
        }

        .panel h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--uq-deep);
            margin-bottom: 4px
        }

        .panel .sub {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 24px
        }

        .field {
            margin-bottom: 18px
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--uq-mid);
            margin-bottom: 6px
        }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: var(--ink);
            background: var(--panel);
            transition: border-color .15s, box-shadow .15s;
        }

        .field input:focus,
        .field textarea:focus,
        .field select:focus {
            outline: none;
            border-color: var(--uq-main);
            box-shadow: 0 0 0 3px rgba(83, 74, 183, .12);
        }

        .field textarea {
            resize: vertical;
            min-height: 74px;
            line-height: 1.5
        }

        .hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px
        }

        .row {
            display: flex;
            gap: 12px
        }

        .row .field {
            flex: 1
        }

        .stars {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .stars select {
            flex: 1
        }

        .swatches {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 2px
        }

        .sw {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform .1s
        }

        .sw:hover {
            transform: scale(1.08)
        }

        .sw.active {
            border-color: var(--ink)
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: var(--uq-main);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background .15s, transform .05s;
            margin-top: 8px;
        }

        .btn:hover {
            background: var(--uq-mid)
        }

        .btn:active {
            transform: scale(.99)
        }

        .btn.ghost {
            background: #fff;
            color: var(--uq-main);
            border: 1px solid var(--uq-main);
            margin-top: 10px
        }

        .btn.ghost:hover {
            background: var(--uq-card)
        }

        /* ---- preview ---- */
        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            min-width: 0
        }

        .stage {
            width: 540px;
            height: 720px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(38, 33, 92, .14);
        }

        @media(max-width:600px) {
            .stage {
                width: 360px;
                height: 480px
            }
        }

        /* canvas is 1080x1440, scaled down via transform */
        .card-root {
            width: 1080px;
            height: 1440px;
            background: #fff;
            position: relative;
            transform-origin: top left;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .frame-border {
            position: absolute;
            inset: 0;
            border: 2px solid var(--uq-card);
            pointer-events: none
        }

        /* background layers */
        .bg-sketch {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 62%;
            opacity: .10;
            pointer-events: none;
            display: flex;
            align-items: flex-end;
            justify-content: center
        }

        .bg-sketch svg {
            width: 100%;
            height: 100%
        }

        .bg-photo {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            display: none;
            pointer-events: none
        }

        .accent-bar {
            position: absolute;
            left: 90px;
            top: 90px;
            width: 76px;
            height: 10px;
            border-radius: 5px;
            background: var(--c-main);
            z-index: 2
        }

        .eyebrow {
            position: absolute;
            left: 90px;
            top: 150px;
            font-size: 40px;
            letter-spacing: 4px;
            color: var(--c-light);
            z-index: 2
        }

        .code {
            position: absolute;
            left: 90px;
            top: 240px;
            font-size: 160px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--c-deep);
            line-height: 1;
            z-index: 2
        }

        .cname {
            position: absolute;
            left: 90px;
            top: 380px;
            font-size: 96px;
            font-weight: 700;
            color: var(--c-deep);
            line-height: 1.12;
            max-width: 900px;
            width: fit-content;
            padding: 2px 14px 2px 0;
            background: linear-gradient(180deg, transparent 0 46%, var(--c-line) 46% 92%, transparent 92%);
            z-index: 2
        }

        .divider {
            position: absolute;
            left: 90px;
            width: 190px;
            height: 3px;
            background: var(--c-line);
            z-index: 2
        }

        .ratings {
            position: absolute;
            left: 90px;
            display: flex;
            gap: 48px;
            z-index: 2
        }

        .rate-item .rlabel {
            font-size: 32px;
            color: var(--c-light);
            margin-bottom: 4px
        }

        .rate-item .rstars {
            font-size: 48px;
            color: var(--c-main);
            letter-spacing: 2px
        }

        .quote-card {
            position: absolute;
            left: 90px;
            width: 900px;
            background: transparent;
            border-radius: 0;
            padding: 0;
            overflow: visible;
            z-index: 2
        }

        .quote-card .qbar {
            display: none
        }

        .quote-card .qtext {
            font-size: 50px;
            font-weight: 700;
            color: var(--c-deep);
            line-height: 1.3;
            letter-spacing: 3px;
            /* white-space: pre-wrap */
        }

        .footer {
            position: absolute;
            left: 90px;
            right: 90px;
            bottom: 80px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            z-index: 2
        }

        .footer .right {
            font-size: 32px;
            color: var(--c-mid);
            text-shadow: 0 1px 3px rgba(255, 255, 255, .55)
        }

        /* white scrim over photo so text stays crisp */
        .scrim {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, .93) 0%,
                    rgba(255, 255, 255, .82) 34%,
                    rgba(255, 255, 255, .58) 62%,
                    rgba(255, 255, 255, .42) 100%)
        }

        /* bottom keyword chips */
        .tags {
            position: absolute;
            left: 90px;
            right: 90px;
            display: none;
            flex-wrap: wrap;
            gap: 14px;
            z-index: 2
        }

        .tags .chip {
            font-size: 36px;
            font-weight: 700;
            color: var(--c-mid);
            background: var(--c-card);
            padding: 9px 22px;
            border-radius: 999px
        }

        .note {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            max-width: 540px
        }
    </style>
</head>

<body>
    <div class="wrap">
        <!-- ============ FORM ============ -->
        <div class="panel">
            <h1>UQ 课程笔记封面</h1>
            <p class="sub">填表单 → 实时预览 → 导出小红书竖版图（1080×1440）</p>

            <div class="field">
                <label>顶部标签</label>
                <input id="f-eyebrow" value="UQ选课笔记">
            </div>

            <div class="field">
                <label>课程代码</label>
                <input id="f-code" value="INFS7410" placeholder="如 INFS7410">
            </div>

            <div class="field">
                <label>课程名称</label>
                <input id="f-name" value="信息检索" placeholder="如 信息检索">
            </div>

            <div class="field">
                <label>一句话点评</label>
                <textarea id="f-quote" placeholder="支持换行">难度中等，但逼你绕开 AI
真正搞懂检索和 RAG 原理
想入门 IR 的可以闭眼冲 ✅</textarea>
                <div class="hint">建议 2–3 行，每行别太长</div>
            </div>

            <div class="row">
                <div class="field">
                    <label>难度</label>
                    <div class="stars"><select id="f-difficulty">
                            <option value="0">不显示</option>
                            <option value="1">★</option>
                            <option value="2">★★</option>
                            <option value="3" selected>★★★</option>
                            <option value="4">★★★★</option>
                            <option value="5">★★★★★</option>
                        </select></div>
                </div>
                <div class="field">
                    <label>推荐</label>
                    <div class="stars"><select id="f-recommend">
                            <option value="0">不显示</option>
                            <option value="1">★</option>
                            <option value="2">★★</option>
                            <option value="3">★★★</option>
                            <option value="4">★★★★</option>
                            <option value="5" selected>★★★★★</option>
                        </select></div>
                </div>
            </div>

            <div class="row">
                <div class="field">
                    <label>右下角 ID</label>
                    <input id="f-id" value="@nilobjectfound">
                </div>
            </div>

            <div class="field">
                <label>底部关键词标签（空格分隔）</label>
                <input id="f-tags" value="">
                <div class="hint">3–4 个最佳，带不带 # 都行</div>
            </div>

            <div class="field">
                <label>配色（同骨架换色，方便区分学科）</label>
                <div class="swatches" id="swatches"></div>
            </div>

            <div class="field">
                <label>背景</label>
                <select id="f-bgtype">
                    <option value="uqphoto" selected>UQ Forgan Smith 钟楼（内置）</option>
                    <option value="sketch">砂岩建筑线稿</option>
                    <option value="none">纯白</option>
                    <option value="photo">我自己的照片</option>
                </select>
            </div>

            <div class="field" id="upload-field" style="display:none">
                <label>上传背景照片</label>
                <input type="file" id="f-bgupload" accept="image/*">
                <div class="hint">建议用你自己拍的 UQ 照片（竖图最佳）。仅在本机处理，不会上传到任何服务器。</div>
            </div>

            <div class="field" id="fade-field">
                <label>背景淡化浓度 · <span id="fade-val">15</span>%</label>
                <input type="range" id="f-fade" min="3" max="45" value="45" step="1" style="padding:0">
            </div>

            <button class="btn" id="btn-png">导出 JPG（2× 高清 · 约 0.5MB）</button>
            <button class="btn ghost" id="btn-copy">复制当前配置</button>
        </div>

        <!-- ============ PREVIEW ============ -->
        <div class="preview-area">
            <div class="stage">
                <div class="card-root" id="card">
                    <img class="bg-photo" id="o-bgphoto" alt="">
                    <div class="bg-sketch" id="o-bgsketch">
                        <svg viewBox="0 0 1080 700" xmlns="http://www.w3.org/2000/svg"
                            preserveAspectRatio="xMidYMax meet">
                            <g fill="none" stroke="var(--c-main)" stroke-width="2.4" stroke-linejoin="round"
                                stroke-linecap="round">
                                <!-- ground line -->
                                <line x1="40" y1="650" x2="1040" y2="650" />
                                <!-- clock tower (left) -->
                                <rect x="120" y="120" width="150" height="530" />
                                <rect x="120" y="120" width="150" height="46" />
                                <path d="M112 120 L195 58 L278 120 Z" />
                                <line x1="195" y1="58" x2="195" y2="32" />
                                <circle cx="195" cy="210" r="34" />
                                <line x1="195" y1="210" x2="195" y2="188" />
                                <line x1="195" y1="210" x2="212" y2="216" />
                                <rect x="150" y="300" width="40" height="92" rx="20" />
                                <rect x="200" y="300" width="40" height="92" rx="20" />
                                <rect x="150" y="430" width="40" height="92" rx="20" />
                                <rect x="200" y="430" width="40" height="92" rx="20" />
                                <!-- cloister arches (right of tower) -->
                                <g>
                                    <rect x="300" y="360" width="700" height="290" />
                                    <line x1="300" y1="360" x2="1000" y2="360" />
                                    <path d="M330 650 L330 470 Q330 430 372 430 Q414 430 414 470 L414 650" />
                                    <path d="M444 650 L444 470 Q444 430 486 430 Q528 430 528 470 L528 650" />
                                    <path d="M558 650 L558 470 Q558 430 600 430 Q642 430 642 470 L642 650" />
                                    <path d="M672 650 L672 470 Q672 430 714 430 Q756 430 756 470 L756 650" />
                                    <path d="M786 650 L786 470 Q786 430 828 430 Q870 430 870 470 L870 650" />
                                    <path d="M900 650 L900 470 Q900 430 942 430 Q970 430 970 470 L970 650" />
                                    <!-- crenellation hints on roofline -->
                                    <line x1="300" y1="360" x2="300" y2="338" />
                                    <line x1="350" y1="360" x2="350" y2="338" />
                                    <line x1="400" y1="360" x2="400" y2="338" />
                                    <line x1="450" y1="360" x2="450" y2="338" />
                                    <line x1="500" y1="360" x2="500" y2="338" />
                                    <line x1="550" y1="360" x2="550" y2="338" />
                                    <line x1="600" y1="360" x2="600" y2="338" />
                                    <line x1="650" y1="360" x2="650" y2="338" />
                                    <line x1="700" y1="360" x2="700" y2="338" />
                                    <line x1="750" y1="360" x2="750" y2="338" />
                                    <line x1="800" y1="360" x2="800" y2="338" />
                                    <line x1="850" y1="360" x2="850" y2="338" />
                                    <line x1="900" y1="360" x2="900" y2="338" />
                                    <line x1="950" y1="360" x2="950" y2="338" />
                                    <line x1="1000" y1="360" x2="1000" y2="338" />
                                </g>
                            </g>
                        </svg>
                    </div>
                    <div class="scrim"></div>
                    <div class="frame-border"></div>
                    <div class="accent-bar" id="o-accent"></div>
                    <div class="eyebrow" id="o-eyebrow"></div>
                    <div class="code" id="o-code"></div>
                    <div class="cname" id="o-name"></div>
                    <div class="divider" id="o-divider"></div>
                    <div class="ratings" id="o-ratings"></div>
                    <div class="quote-card" id="o-quotecard">
                        <div class="qtext" id="o-quote"></div>
                    </div>
                    <div class="tags" id="o-tags"></div>
                    <div class="footer">
                        <div class="right" id="o-id"></div>
                    </div>
                </div>
            </div>
            <p class="note">预览是等比缩小图，导出的是 2160×2880 高清 JPG（约 0.5MB）。换色、改字都会实时更新。</p>
        </div>
    </div>

            $("fade-val").textContent = fade;
            const sketch = $("o-bgsketch"), photo = $("o-bgphoto");
            $("upload-field").style.display = bgType === "photo" ? "block" : "none";
            if (bgType === "sketch") {
                sketch.style.display = "flex"; sketch.style.opacity = fade / 100;
                photo.style.display = "none"; photo.style.opacity = 0;
            } else if (bgType === "uqphoto") {
                photo.src = UQ_BG;
                photo.style.display = "block"; photo.style.opacity = fade / 100;
                sketch.style.display = "none";
            } else if (bgType === "photo" && photo.src && photo.src !== UQ_BG) {
                photo.style.display = "block"; photo.style.opacity = fade / 100;
                sketch.style.display = "none";
            } else if (bgType === "photo" && photo.src === UQ_BG) {
                photo.style.display = "none"; photo.style.opacity = 0;
                sketch.style.display = "none";
            } else {
                sketch.style.display = "none"; photo.style.display = "none";
            }

            $("o-eyebrow").textContent = $("f-eyebrow").value;
            $("o-code").textContent = $("f-code").value;
            $("o-name").textContent = $("f-name").value;
            $("o-quote").textContent = $("f-quote").value;
            $("o-id").textContent = $("f-id").value;

            // shrink the course code so a long code never overflows the right edge
            const codeFit = $("o-code"), codeBase = 160, codeMaxW = 900;
            codeFit.style.fontSize = codeBase + "px";
            const codeW = codeFit.offsetWidth;
            if (codeW > codeMaxW) {
                codeFit.style.fontSize = Math.floor(codeBase * codeMaxW / codeW) + "px";
            }

            // bottom keyword chips
            const tagsEl = $("o-tags");
            tagsEl.innerHTML = "";
            const tagTokens = $("f-tags").value.split(/\s+/).filter(Boolean);
            if (tagTokens.length) {
                tagsEl.style.display = "flex";
                tagTokens.forEach(t => {
                    const c = document.createElement("div");
                    c.className = "chip";
                    c.textContent = t;
                    tagsEl.appendChild(c);
                });
            } else {
                tagsEl.style.display = "none";
            }

            // ratings content (positioned later by the stack layout)
            const diff = +$("f-difficulty").value, rec = +$("f-recommend").value;
            const rbox = $("o-ratings"); rbox.innerHTML = "";
            const mkStars = n => "★".repeat(n) + "☆".repeat(5 - n);
            if (diff > 0) { rbox.innerHTML += `<div class="rate-item"><div class="rlabel">难度</div><div class="rstars">${mkStars(diff)}</div></div>`; }
            if (rec > 0) { rbox.innerHTML += `<div class="rate-item"><div class="rlabel">推荐</div><div class="rstars">${mkStars(rec)}</div></div>`; }
            const showRatings = diff > 0 || rec > 0;
            rbox.style.display = showRatings ? "flex" : "none";

            // ---- vertical layout: one stack, centered with a slight upward bias ----
            // measures real heights, then balances top/bottom whitespace so it never looks top-heavy
            const accent = $("o-accent"), eyebrow = $("o-eyebrow"), codeEl = $("o-code"),
                nameEl = $("o-name"), divider = $("o-divider"), qc = $("o-quotecard");
            const showTags = tagsEl.style.display !== "none";

            const GAP = { accentEb: 38, ebCode: 28, codeName: 18, nameDiv: 34, divRate: 40, rateQuote: 96, quoteTags: 54 };
            const Haccent = 10, Hdivider = 3;
            const ebH = eyebrow.offsetHeight, codeH = codeEl.offsetHeight, nameH = nameEl.offsetHeight,
                rateH = showRatings ? rbox.offsetHeight : 0, quoteH = qc.offsetHeight,
                tagsH = showTags ? tagsEl.offsetHeight : 0;

            let total = Haccent + GAP.accentEb + ebH + GAP.ebCode + codeH + GAP.codeName + nameH + GAP.nameDiv + Hdivider;
            if (showRatings) total += GAP.divRate + rateH;
            total += GAP.rateQuote + quoteH;
            if (showTags) total += GAP.quoteTags + tagsH;

            // center the whole stack vertically with a slight upward optical bias
            let cy = Math.max(110, (1440 - total) / 2 - 100);

            accent.style.top = cy + "px"; cy += Haccent + GAP.accentEb;
            eyebrow.style.top = cy + "px"; cy += ebH + GAP.ebCode;
            codeEl.style.top = cy + "px"; cy += codeH + GAP.codeName;
            nameEl.style.top = cy + "px"; cy += nameH + GAP.nameDiv;
            divider.style.top = cy + "px"; cy += Hdivider;
            if (showRatings) { cy += GAP.divRate; rbox.style.top = cy + "px"; cy += rateH; }
            cy += GAP.rateQuote;
            qc.style.top = cy + "px"; cy += quoteH;
            if (showTags) { cy += GAP.quoteTags; tagsEl.style.top = cy + "px"; }
        }

        // initial scale of preview stage
        function fitStage() {
            const stage = document.querySelector(".stage");
            const scale = stage.clientWidth / 1080;
            card.style.transform = `scale(${scale})`;
        }

        ["f-eyebrow", "f-code", "f-name", "f-quote", "f-difficulty", "f-recommend", "f-id", "f-tags", "f-bgtype", "f-fade"]
            .forEach(id => { $(id).addEventListener("input", render); });

        $("f-bgupload").addEventListener("change", e => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => { $("o-bgphoto").src = ev.target.result; $("f-bgtype").value = "photo"; render(); };
            reader.readAsDataURL(file);
        });

        $("btn-png").onclick = async () => {
            const btn = $("btn-png"); const old = btn.textContent; btn.textContent = "导出中…"; btn.disabled = true;
            card.style.transform = "scale(1)";
            try {
                const cv = await html2canvas(card, { scale: 2, backgroundColor: "#ffffff", width: 1080, height: 1440, useCORS: true });
                const a = document.createElement("a");
                a.download = `${$("f-code").value || "course"}-xiaohongshu.jpg`;
                a.href = cv.toDataURL("image/jpeg", 0.92);
                a.click();
            } catch (e) { alert("导出失败：" + e.message); }
            fitStage();
            btn.textContent = old; btn.disabled = false;
        };

        $("btn-copy").onclick = () => {
            const cfg = {};
            ["f-eyebrow", "f-code", "f-name", "f-quote", "f-difficulty", "f-recommend", "f-id", "f-tags", "f-bgtype", "f-fade"].forEach(id => cfg[id] = $(id).value);
            cfg.palette = currentPal;
            navigator.clipboard.writeText(JSON.stringify(cfg, null, 2)).then(() => {
                const b = $("btn-copy"); const o = b.textContent; b.textContent = "已复制 ✓"; setTimeout(() => b.textContent = o, 1200);
            });
        };

        window.addEventListener("resize", fitStage);
        buildSwatches();
        render();
        fitStage();
    </script>
</body>

</html>
